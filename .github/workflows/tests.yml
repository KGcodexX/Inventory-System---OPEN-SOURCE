name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pytest
          pip install -r requirements.txt

      - name: Correr tests
        run: python -m pytest tests/ -v
