<svg viewBox="0 0 980 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <rect width="980" height="720" fill="#ffffff"/>

  <!-- Fila 1: inventario y lote_inventario -->
  <g>
    <rect x="60" y="40" width="200" height="130" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="60" y="40" width="200" height="28" fill="#475569"/>
    <text x="160" y="59" text-anchor="middle" fill="#ffffff" font-weight="bold">inventario</text>
    <text x="72" y="84">id (PK)</text>
    <text x="72" y="102">marca, nombre, sexo</text>
    <text x="72" y="120">mililitros, precio,</text>
    <text x="72" y="138">precio_mayoreo</text>
    <text x="72" y="156">existencias, costo_actual</text>
  </g>

  <g>
    <rect x="370" y="40" width="200" height="110" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="370" y="40" width="200" height="28" fill="#475569"/>
    <text x="470" y="59" text-anchor="middle" fill="#ffffff" font-weight="bold">lote_inventario</text>
    <text x="382" y="84">id (PK)</text>
    <text x="382" y="102">perfume_id (FK)</text>
    <text x="382" y="120">cantidad, costo_unitario</text>
    <text x="382" y="138">unidades_disponibles</text>
  </g>
  <line x1="260" y1="105" x2="370" y2="105" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="265" y="98" font-size="10" fill="#64748b">1 perfume : N lotes</text>

  <!-- columna vertical desde inventario hacia abajo, para llegar ortogonalmente a detalle_venta / detalle_compra -->
  <line x1="60" y1="105" x2="20" y2="105" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="20" y1="105" x2="20" y2="650" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- Fila 2: clientes y ventas -->
  <g>
    <rect x="60" y="290" width="200" height="110" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="60" y="290" width="200" height="28" fill="#475569"/>
    <text x="160" y="309" text-anchor="middle" fill="#ffffff" font-weight="bold">clientes</text>
    <text x="72" y="334">id (PK)</text>
    <text x="72" y="352">nombre, telefono</text>
    <text x="72" y="370">correo, tipo</text>
  </g>

  <g>
    <rect x="370" y="290" width="200" height="110" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="370" y="290" width="200" height="28" fill="#475569"/>
    <text x="470" y="309" text-anchor="middle" fill="#ffffff" font-weight="bold">ventas</text>
    <text x="382" y="334">id (PK)</text>
    <text x="382" y="352">cliente_id (FK)</text>
    <text x="382" y="370">metodo_pago, fecha</text>
  </g>
  <line x1="260" y1="345" x2="370" y2="345" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="265" y="338" font-size="10" fill="#64748b">1 cliente : N ventas</text>

  <!-- Fila 2: detalle_venta -->
  <g>
    <rect x="700" y="290" width="220" height="150" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="700" y="290" width="220" height="28" fill="#475569"/>
    <text x="810" y="309" text-anchor="middle" fill="#ffffff" font-weight="bold">detalle_venta</text>
    <text x="712" y="334">id (PK)</text>
    <text x="712" y="352">venta_id (FK)</text>
    <text x="712" y="370">perfume_id (FK)</text>
    <text x="712" y="388">nombre_perfume, cantidad,</text>
    <text x="712" y="406">tipo_precio, total, ganancia</text>
  </g>
  <line x1="570" y1="345" x2="700" y2="345" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="575" y="338" font-size="10" fill="#64748b">1 venta : N detalles</text>

  <!-- conexion ortogonal: inventario -> detalle_venta (via perfume_id) -->
  <line x1="20" y1="105" x2="20" y2="365" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="20" y1="365" x2="700" y2="365" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="350" y="282" font-size="10" fill="#64748b">detalle_venta.perfume_id -&gt; inventario.id</text>

  <!-- Fila 3: proveedores, compras, detalle_compra -->
  <g>
    <rect x="60" y="500" width="200" height="90" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="60" y="500" width="200" height="28" fill="#475569"/>
    <text x="160" y="519" text-anchor="middle" fill="#ffffff" font-weight="bold">proveedores</text>
    <text x="72" y="544">id (PK)</text>
    <text x="72" y="562">nombre, telefono, correo</text>
  </g>

  <g>
    <rect x="370" y="500" width="200" height="90" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="370" y="500" width="200" height="28" fill="#475569"/>
    <text x="470" y="519" text-anchor="middle" fill="#ffffff" font-weight="bold">compras</text>
    <text x="382" y="544">id (PK)</text>
    <text x="382" y="562">proveedor_id (FK)</text>
    <text x="382" y="580">total, fecha</text>
  </g>
  <line x1="260" y1="545" x2="370" y2="545" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="265" y="538" font-size="10" fill="#64748b">1 proveedor : N compras</text>

  <g>
    <rect x="700" y="500" width="220" height="110" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <rect x="700" y="500" width="220" height="28" fill="#475569"/>
    <text x="810" y="519" text-anchor="middle" fill="#ffffff" font-weight="bold">detalle_compra</text>
    <text x="712" y="544">id (PK)</text>
    <text x="712" y="562">compra_id (FK), perfume_id (FK)</text>
    <text x="712" y="580">cantidad, costo_unitario, total</text>
  </g>
  <line x1="570" y1="545" x2="700" y2="545" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="575" y="538" font-size="10" fill="#64748b">1 compra : N detalles</text>

  <line x1="20" y1="650" x2="20" y2="565" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="20" y1="565" x2="700" y2="565" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,3"/>
  <text x="350" y="650" font-size="10" fill="#64748b">detalle_compra.perfume_id -&gt; inventario.id</text>

  <!-- usuarios, sin relacion directa -->
  <g>
    <rect x="700" y="40" width="200" height="90" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="700" y="40" width="200" height="28" fill="#94a3b8"/>
    <text x="800" y="59" text-anchor="middle" fill="#ffffff" font-weight="bold">usuarios</text>
    <text x="712" y="84">id (PK), usuario</text>
    <text x="712" y="102">password_hash, salt, rol</text>
  </g>
  <text x="800" y="148" text-anchor="middle" font-size="10" fill="#94a3b8">sin relacion directa con las demas tablas</text>
  <text x="800" y="162" text-anchor="middle" font-size="10" fill="#94a3b8">(solo se usa desde auth.py)</text>

  <text x="20" y="700" font-size="11" fill="#94a3b8">Las lineas punteadas representan relaciones por perfume_id entre inventario y los detalles de venta/compra.</text>
</svg>
